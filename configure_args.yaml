local_dir: ""
project_name: ""
include_patterns:
- '*.c'
- '*.cc'
- '*.cpp'
- '*.go'
- '*.h'
- '*.java'
- '*.js'
- '*.jsx'
- '*.md'
- '*.py'
- '*.pyi'
- '*.pyx'
- '*.rst'
- '*.ts'
- '*.tsx'
- '*.yaml'
- '*.yml'
- '*Dockerfile'
- '*Makefile'
exclude_patterns:
- '*.log'
- '*.venv/*'
- '*bin/*'
- '*build/*'
- '*deprecated/*'
- '*dist/*'
- '*docs/*'
- '*examples/*'
- '*experimental/*'
- '*legacy/*'
- '*misc/*'
- '*node_modules/*'
- '*obj/*'
- '*test*'
- '*tests/*'
- '*venv/*'
- .git/*
- .github/*
- .next/*
- .vscode/*
- assets/*
- data/*
- images/*
- public/*
- static/*
- temp/*
- v1/*
output_dir: output
language: english
max_file_size: 100000
use_cache: true
max_abstraction_num: 10
llm_require_consent: true
llm_show_prompt: false
log_dir: workspace/logs
llm_cache_file: workspace/cache/llm_cache.json
llm_manual_dir: workspace/llm
llm_manual_poll_interval_s: 2.0
llm_manual_timeout_s: 0
llm_redact_logs: true
